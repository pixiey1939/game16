<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>GAME 16 — 消失的麻姐</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="stylesheet" href="css/style.css?v=52">
  <script src="js/evidence.js?v=52"></script>
  <script src="js/ui.js?v=52"></script>
  <script src="js/game.js?v=55"></script>
  <script src="js/command.js?v=55"></script>
  <script src="js/main.js?v=51"></script>
</head>
<body>
  <div id="terminal">
    <!-- 数字人徽章：右上角常驻显示 -->
    <div id="digital-avatar" class="digital-avatar-badge">
      <span class="pulse-dot"></span>
      <span class="avatar-label">数字麻姐 · 在线</span>
    </div>

    <!-- 实时时钟：顶部显示（JS 每秒更新） -->
    <div id="header-clock" class="header-clock">00:00:00</div>

    <div id="countdown-overlay" class="countdown-overlay" style="display:none;">
      <div class="countdown-label">⚠ 距离数据清除还有</div>
      <div class="countdown-time">60</div>
      <div class="countdown-unit">秒</div>
    </div>

    <!-- 终端顶部：副标题（ASCII art 由 JS startScreen() 动态输出） -->
    <div id="header">
      <p class="subtitle">消失的麻姐</p>
    </div>

    <!-- 输出区域（终端主体） -->
    <div id="output" role="log" aria-live="polite"></div>

    <!-- 输入行 -->
    <div id="input-line">
      <span class="prompt">&gt;</span>
      <input type="text" id="command-input" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" autofocus>
    </div>
  </div>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(function(regs) {
    regs.forEach(function(r) { r.unregister(); });
  });
}
if ('caches' in window) {
  caches.keys().then(function(names) {
    names.forEach(function(name) { caches.delete(name); });
  });
}
</script>
</body>
</html>
