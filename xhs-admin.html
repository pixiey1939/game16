<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小红书 ID 收集后台</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 40px; margin: 0; }
    h1 { color: #ff6b6b; border-bottom: 2px solid #ff6b6b33; padding-bottom: 12px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { text-align: left; padding: 10px 14px; border-bottom: 1px solid #333; }
    th { color: #ff6b6b; font-weight: 600; background: #16213e; }
    tr:hover td { background: #16213e55; }
    .empty { color: #888; text-align: center; padding: 60px; font-size: 18px; }
    .count { color: #aaa; margin-top: 16px; }
    button { background: #ff6b6b; color: #fff; border: none; padding: 10px 24px; border-radius: 6px; cursor: pointer; font-size: 14px; margin-right: 10px; }
    button:hover { background: #ff5252; }
    button.export { background: #4ecdc4; }
    button.export:hover { background: #3dbdb5; }
    button.clear { background: #555; }
    button.clear:hover { background: #777; }
  </style>
</head>
<body>
  <h1>📋 小红书 ID 收集结果</h1>
  <div id="controls">
    <button onclick="refreshData()">🔄 刷新</button>
    <button class="export" onclick="exportCSV()">📥 导出 CSV</button>
    <button class="clear" onclick="clearData()">🗑️ 清空</button>
  </div>
  <div id="output"><div class="empty">加载中...</div></div>

  <script>
    var SUPABASE_URL = 'https://yfjgbikqgeazdmcaztxd.supabase.co';
    var SUPABASE_KEY = 'sb_publishable_ybPS4-Rcq5M_-X_EpRX-PA_FGCB3PNR';

    function refreshData() {
      var out = document.getElementById('output');
      out.innerHTML = '<div class="empty">加载中...</div>';

      var xhr = new XMLHttpRequest();
      xhr.open('GET', SUPABASE_URL + '/rest/v1/xhs_ids?select=*&order=created_at.desc', true);
      xhr.setRequestHeader('apikey', SUPABASE_KEY);
      xhr.setRequestHeader('Authorization', 'Bearer ' + SUPABASE_KEY);
      xhr.onload = function() {
        if (xhr.status >= 200 && xhr.status < 300) {
          var list;
          try { list = JSON.parse(xhr.responseText); } catch(e) { list = []; }
          renderList(list);
        } else {
          out.innerHTML = '<div class="empty">加载失败 (HTTP ' + xhr.status + ')</div>';
        }
      };
      xhr.onerror = function() {
        out.innerHTML = '<div class="empty">网络错误，无法连接到服务器</div>';
      };
      xhr.send();
    }

    function renderList(list) {
      var out = document.getElementById('output');
      if (!list || list.length === 0) {
        out.innerHTML = '<div class="empty">暂无收集数据</div>';
        return;
      }
      var html = '<table><thead><tr><th>#</th><th>小红书 ID</th><th>提交时间</th></tr></thead><tbody>';
      for (var i = 0; i < list.length; i++) {
        var d = new Date(list[i].created_at);
        var pad = function(n) { return String(n).padStart(2, '0'); };
        var timeStr = d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) +
          ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
        html += '<tr><td>' + (i + 1) + '</td><td>' + list[i].xhs_id + '</td><td>' + timeStr + '</td></tr>';
      }
      html += '</tbody></table>';
      html += '<div class="count">共 ' + list.length + ' 条记录</div>';
      out.innerHTML = html;
    }

    function exportCSV() {
      var rows = document.querySelectorAll('tbody tr');
      if (!rows.length) { alert('无数据可导出'); return; }
      var csv = '序号,小红书ID,提交时间\n';
      for (var i = 0; i < rows.length; i++) {
        var cells = rows[i].querySelectorAll('td');
        csv += (i + 1) + ',' + cells[1].textContent + ',' + cells[2].textContent + '\n';
      }
      var blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'xhs-ids-' + new Date().toISOString().slice(0, 10) + '.csv';
      a.click();
    }

    function clearData() {
      if (!confirm('确认清空所有收集的小红书 ID？（仅清空当前展示，数据库需在 Supabase 控制台删除）')) return;
      // clearData 在静态前端页面上只能清空本地视图，数据库删除需在 Supabase 控制台操作
      location.reload();
    }

    refreshData();
  </script>
</body>
</html>
